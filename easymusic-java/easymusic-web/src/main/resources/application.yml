server:
  port: 8090
  servlet:
    context-path: /api
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/easymusic?allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    jedis:
      pool:
        max-active: 20
        max-wait: -1
        max-idle: 10
        min-idle: 0
    timeout: 2000  
  task:
    scheduling:
      pool:
        size: 5
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated  # 开启发送方确认
    publisher-returns: true  # 开启发送失败返回
    template:
      mandatory: true  # 消息必须到达队列,否则返回
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 2
        max-concurrency: 5
  # Elasticsearch 配置
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 60s

mybatis:
  configuration:
    map-underscore-to-camel-case: true

#项目目录
project:
  folder: e:/webser/easymusic/web/
  #日志级别配置
log:
  root:
  level: debug

